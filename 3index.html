<!DOCTYPE html>
<html>
<head>
    <title>Video Dewasa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Video Kuy</h2>

    <div class="video-container">
        <video id="myVideo" controls>
            <source src="WhatsApp Video 2026-04-24 at 07.15.56.mp4" type="video/mp4">
            Browser Anda tidak mendukung video.
        </video>
    </div>

<script>
let sudahKlik = false;

document.getElementById("myVideo").addEventListener("play", function() {
    if (!sudahKlik) {
        window.open("https://vidz.site/yrs6XA9", "_blank");
        sudahKlik = true;
    }
});
</script>
    
</body>
</html>
